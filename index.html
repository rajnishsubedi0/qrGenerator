<!DOCTYPE html>
<html lang="en">
<head>
<title>Lumbini Bikas Bank - QR Code Generator</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-dark:  #004f96;
    --blue-mid:   #0072c6;
    --blue-light: #0099dd;
    --bg:         #ddeef9;
    --card-bg:    #ffffff;
    --panel-bg:   #f0f8ff;
    --border:     #c8dff0;
    --label:      #4a6178;
    --hint:       #9ab2c6;
    --shadow:     0 12px 56px rgba(0,90,170,0.14);
    --radius-lg:  22px;
    --radius-md:  13px;
    --radius-sm:  10px;
  }

  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(145deg, #cce4f5 0%, #eaf4fd 45%, #d4ecfb 100%);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: clamp(12px, 3vw, 32px);
  }

  /* ════════════════════════════════
     MAIN CARD
  ════════════════════════════════ */
  .card {
    width: 100%;
    max-width: 1100px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ════════════════════════════════
     HEADER
  ════════════════════════════════ */
  .header {
    background: linear-gradient(90deg, var(--blue-dark) 0%, var(--blue-light) 100%);
    padding: clamp(14px, 2.5vw, 22px) clamp(16px, 3vw, 36px);
    display: flex;
    align-items: center;
    gap: clamp(12px, 2vw, 22px);
    flex-shrink: 0;
  }

  .header-logo-box {
    background: #fff;
    border-radius: var(--radius-sm);
    padding: clamp(4px, 0.8vw, 8px) clamp(8px, 1.2vw, 14px);
    flex-shrink: 0;
  }

  .header-logo-box img {
    display: block;
    height: clamp(36px, 5vw, 56px);
    width: auto;
  }

  .header-text { color: #fff; min-width: 0; }

  .header-text h1 {
    font-size: clamp(14px, 2.2vw, 22px);
    font-weight: 900;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-text p {
    font-size: clamp(10px, 1.3vw, 13px);
    opacity: 0.82;
    font-weight: 600;
    margin-top: 2px;
  }

  /* ════════════════════════════════
     BODY ROW  (landscape: side-by-side)
  ════════════════════════════════ */
  .body-row {
    display: flex;
    flex-direction: row;
    flex: 1 1 auto;
    min-height: 0;
  }

  /* ── Form panel (left) ── */
  .form-panel {
    flex: 1 1 0;
    min-width: 0;
    padding: clamp(20px, 3.5vw, 44px) clamp(20px, 4vw, 48px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    border-right: 2px solid var(--border);
  }

  .section-title {
    font-size: clamp(12px, 1.4vw, 15px);
    font-weight: 800;
    color: var(--blue-mid);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: clamp(14px, 2vw, 24px);
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }

  .form-group { margin-bottom: clamp(12px, 1.8vw, 20px); }
  .form-group:last-of-type { margin-bottom: 0; }

  label {
    display: block;
    font-size: clamp(10px, 1.1vw, 12px);
    font-weight: 800;
    color: var(--label);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }

  input[type="text"] {
    width: 100%;
    padding: clamp(10px, 1.2vw, 14px) clamp(12px, 1.4vw, 16px);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: clamp(13px, 1.4vw, 16px);
    font-family: 'Nunito', sans-serif;
    color: #1a2a3a;
    background: var(--panel-bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--blue-mid);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(0,114,198,0.12);
  }

  input[type="text"]::placeholder { color: #b0c4d8; }

  .generate-btn {
    margin-top: clamp(16px, 2.2vw, 28px);
    width: 100%;
    padding: clamp(12px, 1.4vw, 16px);
    background: linear-gradient(90deg, var(--blue-dark), var(--blue-light));
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: clamp(13px, 1.5vw, 17px);
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 4px 18px rgba(0,100,180,0.22);
  }

  .generate-btn:hover  { opacity: 0.9; box-shadow: 0 6px 24px rgba(0,100,180,0.3); }
  .generate-btn:active { transform: scale(0.975); }

  .credit-text {
    margin-top: clamp(10px, 1.2vw, 16px);
    text-align: center;
    font-size: clamp(11px, 1.1vw, 13px);
    font-weight: 700;
    color: var(--hint);
    letter-spacing: 0.3px;
  }

  /* ── QR panel (right) ── */
  .qr-panel {
    flex: 0 0 clamp(260px, 38%, 460px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(24px, 3.5vw, 48px) clamp(20px, 3vw, 40px);
    background: var(--panel-bg);
  }

  .qr-card {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    padding: clamp(14px, 1.8vw, 22px);
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 4px 24px rgba(0,90,170,0.10);
    width: 100%;
    max-width: 340px;
  }

  #qrcode {
    /* Size driven by JS but capped visually */
    width: 100% !important;
    max-width: 280px;
    aspect-ratio: 1;
  }

  /* override canvas/table inside #qrcode to be fluid */
  #qrcode canvas,
  #qrcode img,
  #qrcode table {
    width: 100% !important;
    height: auto !important;
    max-width: 100%;
    display: block;
  }

  .qr-divider {
    width: 80%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: clamp(10px, 1.2vw, 16px) 0 clamp(8px, 1vw, 14px);
  }

  .bank-logo-strip {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .bank-logo-strip img {
    height: clamp(28px, 3.5vw, 44px);
    width: auto;
    display: block;
  }

  .qr-hint {
    margin-top: clamp(10px, 1.2vw, 16px);
    font-size: clamp(10px, 1vw, 12px);
    color: var(--hint);
    font-weight: 700;
    letter-spacing: 0.4px;
    text-align: center;
  }

  .qr-account-name {
    font-size: clamp(12px, 1.4vw, 16px);
    font-weight: 900;
    color: var(--blue-dark);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    text-align: center;
    margin: clamp(6px, 0.8vw, 10px) 0 clamp(4px, 0.6vw, 8px);
    word-break: break-word;
    min-height: 1.4em;
  }



  /* ════════════════════════════════
     TABLET  ≤ 768px  →  stack
  ════════════════════════════════ */
  @media (max-width: 768px) {
    body { padding: 12px; align-items: flex-start; }

    .card {
      border-radius: 18px;
      max-width: 100%;
    }

    .body-row {
      flex-direction: column;
    }

    .form-panel {
      border-right: none;
      border-bottom: 2px solid var(--border);
      padding: 22px 20px 20px;
    }

    .qr-panel {
      flex: none;
      padding: 22px 20px 24px;
    }

    .qr-card { max-width: 280px; }

    #qrcode { max-width: 240px; }
  }

  /* ════════════════════════════════
     MOBILE  ≤ 480px
  ════════════════════════════════ */
  @media (max-width: 480px) {
    body { padding: 8px; }

    .card { border-radius: 14px; }

    .header { padding: 12px 14px; gap: 10px; }
    .header-logo-box img { height: 32px; }
    .header-text h1 { font-size: 13px; }
    .header-text p  { font-size: 10px; }

    .form-panel { padding: 16px 14px 14px; }

    .section-title { font-size: 11px; margin-bottom: 14px; }

    input[type="text"] { font-size: 14px; padding: 10px 12px; }

    .generate-btn { font-size: 14px; padding: 12px; margin-top: 14px; }

    .qr-panel { padding: 16px 14px 20px; }
    .qr-card  { padding: 12px; max-width: 240px; }
    #qrcode   { max-width: 200px; }

    .bank-logo-strip img { height: 26px; }
    .qr-hint { font-size: 10px; }
    .qr-account-name { font-size: 12px; }
  }

  /* ════════════════════════════════
     LARGE  ≥ 1200px  →  fill screen
  ════════════════════════════════ */
  @media (min-width: 1200px) {
    body {
      padding: 28px 40px;
    }

    .card {
      max-width: 100%;
      height: calc(100vh - 56px);
    }

    .body-row { flex: 1 1 auto; }

    .form-panel {
      padding: 52px 60px;
      justify-content: center;
    }

    .qr-panel {
      flex: 0 0 44%;
      padding: 52px 48px;
    }

    .qr-card {
      max-width: 400px;
      padding: 28px;
    }

    #qrcode { max-width: 340px; }

    .bank-logo-strip img { height: 50px; }
    .qr-account-name { font-size: 17px; }
  }

  /* ════════════════════════════════
     EXTRA LARGE  ≥ 1600px
  ════════════════════════════════ */
  @media (min-width: 1600px) {
    .form-panel { padding: 64px 80px; }
    .qr-panel   { padding: 64px 64px; flex: 0 0 46%; }
    .qr-card    { max-width: 460px; padding: 34px; }
    #qrcode     { max-width: 390px; }
    .bank-logo-strip img { height: 58px; }
    .section-title { font-size: 16px; }
    input[type="text"] { font-size: 18px; padding: 16px 18px; }
    .generate-btn { font-size: 19px; padding: 18px; }
    .qr-account-name { font-size: 19px; }
  }
</style>
</head>

/* ── QR size: pick based on viewport ── */
function getQRSize() {
  var w = window.innerWidth;
  if (w >= 1600) return 390;
  if (w >= 1200) return 340;
  if (w >= 768)  return 240;
  if (w >= 480)  return 210;
  return 190;
}

var qrcode = new QRCode(document.getElementById("qrcode"), {
  width:  getQRSize(),
  height: getQRSize(),
  correctLevel: QRCode.CorrectLevel.H
});

/* Rebuild QR on resize so it fills the panel correctly */
window.addEventListener('resize', function() {
  var sz = getQRSize();
  document.getElementById("qrcode").innerHTML = "";
  qrcode = new QRCode(document.getElementById("qrcode"), {
    width:  sz,
    height: sz,
    correctLevel: QRCode.CorrectLevel.H
  });
  if (document.getElementById("qrText").value) {
    qrcode.makeCode(document.getElementById("qrText").value);
  }
});

function buildJson() {
  return '{"accountNumber":"' + document.getElementById('accountNumber').value +
    '","accountName":"' + document.getElementById('accountName').value +
    '","bankCode":"LBBLMB","accountType":"' + document.getElementById('accountType').value + '"}'
}

['accountName','accountNumber','accountType'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById('qrText').value = buildJson();
  });
});

function makeCode() {
  var name = document.getElementById('accountName').value.trim();
  var num  = document.getElementById('accountNumber').value.trim();
  if (!name || !num) {
    alert("Please enter at least Account Name and Account Number.");
    return;
  }
  document.getElementById('qrText').value = buildJson();
  qrcode.makeCode(document.getElementById('qrText').value);
  document.getElementById('qrAccountNameDisplay').textContent = name.toUpperCase();
}

</script>
</body>
</html>
